<!DOCTYPE html>
<html>
<head>
    <title>Pizza Clicker</title>

    <style>
        body {
            background-color: lightblue;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        /* Rotate Warning Screen */
        #rotateWarning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: lightblue;
            z-index: 99999;
            text-align: center;
            padding-top: 40%;
            font-size: 28px;
            font-weight: bold;
        }

        /* Game container (safe to hide) */
        #gameContainer {
            visibility: visible;
        }

        /* Update Label */
        #updateLabel {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            color: #222;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.25);
        }

        /* Pizza Counter */
        #scoreLabel {
            position: absolute;
            left: 575px;
            top: 100px;
        }

        /* Top Buttons */
        #achievementsBtn, #updatesBtn {
            position: absolute;
            right: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #achievementsBtn { top: 20px; }
        #updatesBtn { top: 70px; }

        /* Save / Reset Buttons */
        #saveBtn, #resetBtn {
            position: absolute;
            bottom: 100px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #saveBtn { left: 550px; }
        #resetBtn { right: 550px; }

        /* Pizza Button */
        #pizzaButton {
            position: absolute;
            left: 675px;
            top: 200px;
            width: 100px;
            height: 100px;
            font-size: 70px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Section Titles */
        #clickTitle {
            position: absolute;
            left: 340px;
            top: 300px;
        }

        #autoTitle {
            position: absolute;
            left: 1000px;
            top: 300px;
        }

        /* Click Upgrades */
        #upgrade1, #upgrade2, #upgrade3, #upgrade4 {
            position: absolute;
            left: 340px;
            width: 150px;
            height: 50px;
        }

        #upgrade1 { top: 350px; }
        #upgrade2 { top: 400px; }
        #upgrade3 { top: 450px; }
        #upgrade4 { top: 500px; }

        /* Click Upgrade Labels */
        #upgrade1Label, #upgrade2Label, #upgrade3Label, #upgrade4Label {
            position: absolute;
            left: 500px;
            font-weight: bold;
        }

        #upgrade1Label { top: 350px; }
        #upgrade2Label { top: 400px; }
        #upgrade3Label { top: 450px; }
        #upgrade4Label { top: 500px; }

        /* Auto Upgrades */
        #chefBtn, #ovenBtn, #restaurantBtn, #managerBtn {
            position: absolute;
            left: 1000px;
            width: 150px;
            height: 50px;
        }

        #chefBtn { top: 350px; }
        #ovenBtn { top: 400px; }
        #restaurantBtn { top: 450px; }
        #managerBtn { top: 500px; }

        /* Auto Upgrade Labels */
        #chefLabel, #ovenLabel, #restaurantLabel, #managerLabel {
            position: absolute;
            left: 1160px;
            font-weight: bold;
        }

        #chefLabel { top: 350px; }
        #ovenLabel { top: 400px; }
        #restaurantLabel { top: 450px; }
        #managerLabel { top: 500px; }

        /* Achievement Popup */
        .achievement-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: gold;
            padding: 20px 30px;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            z-index: 10000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* Achievements Modal */
        #achievementModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9998;
        }

        .achievement-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            height: 400px;
            overflow-y: auto;
            text-align: center;
        }

        /* Updates Modal */
        #updatesModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9998;
        }

        .updates-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            height: 300px;
            text-align: center;
            overflow-y: auto;
        }
    </style>
</head>

<body>

    <!-- Rotate Warning -->
    <div id="rotateWarning">
        Please rotate your device<br>
        This game is landscape only
    </div>

    <!-- GAME CONTENT WRAPPER -->
    <div id="gameContainer">

        <h1 id="updateLabel">New Update – Version 1.1.0</h1>
        <h1 id="scoreLabel">Pizzas: 0</h1>

        <button id="achievementsBtn" onclick="showAchievements()">🏆 Achievements</button>
        <button id="updatesBtn" onclick="openUpdates()">Updates</button>

        <button id="saveBtn" onclick="saveGame()">Save Game</button>
        <button id="resetBtn" onclick="resetGame()">Reset Game</button>

        <button id="pizzaButton" onclick="pizzaClicked()">🍕</button>

        <h2 id="clickTitle">Click Upgrades</h2>

        <button id="upgrade1" onclick="buyupgrade1()">Upgrade 1 (Cost: 10 Pizzas +0.1 per click)</button>
        <p id="upgrade1Label">Owned: 0</p>

        <button id="upgrade2" onclick="buyupgrade2()">Upgrade 2 (Cost: 100 Pizzas +1.2 per click)</button>
        <p id="upgrade2Label">Owned: 0</p>

        <button id="upgrade3" onclick="buyupgrade3()">Upgrade 3 (Cost: 250 Pizzas +3.2 per click)</button>
        <p id="upgrade3Label">Owned: 0</p>

        <button id="upgrade4" onclick="buyupgrade4()">Upgrade 4 (Cost: 1000 Pizzas +13 per click)</button>
        <p id="upgrade4Label">Owned: 0</p>

        <h2 id="autoTitle">Auto Upgrades</h2>

        <button id="chefBtn" onclick="buyChef()">Chef (Cost: 50 Pizzas +0.1/sec)</button>
        <p id="chefLabel">Owned: 0</p>

        <button id="ovenBtn" onclick="buyOven()">Oven (Cost: 500 Pizzas +1.5/sec)</button>
        <p id="ovenLabel">Owned: 0</p>

        <button id="restaurantBtn" onclick="buyRestaurant()">Restaurant (Cost: 2000 Pizzas +6.5/sec)</button>
        <p id="restaurantLabel">Owned: 0</p>

        <button id="managerBtn" onclick="buyManager()">Manager (Cost: 5000 Pizzas +17.5/sec)</button>
        <p id="managerLabel">Owned: 0</p>

        <div id="achievementModal">
            <div class="achievement-box" id="achievementContent"></div>
        </div>

        <div id="updatesModal">
            <div class="updates-box">
                <h2>Updates Version 1.1.0</h2>
                <ul>
                    <br> Added 8 new achievements... (unchanged)
                </ul>
                <button onclick="closeUpdates()">Close</button>
            </div>
        </div>

    </div> <!-- END GAME CONTAINER -->

    <script src="script.js"></script>

    <script>
        /* SAFE Landscape Lock */
        function checkOrientation() {
            const warning = document.getElementById("rotateWarning");
            const game = document.getElementById("gameContainer");

            if (window.innerHeight > window.innerWidth) {
                warning.style.display = "block";
                game.style.display = "none";
            } else {
                warning.style.display = "none";
                game.style.display = "block";
            }
        }

        window.addEventListener("resize", checkOrientation);
        window.addEventListener("orientationchange", checkOrientation);
        window.addEventListener("load", checkOrientation);
    </script>

</body>
</html>
